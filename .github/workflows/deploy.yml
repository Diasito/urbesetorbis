name: Deploy to production

on:
  push:
    branches: [main]
    paths:
      - index.html
      - main.js
      - style.css
      - vite.config.js
      - package.json
      - package-lock.json
      - public/**

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - name: Upload to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: ${{ secrets.FTP_TARGET_DIR }}/

      - name: Upload public static files
        run: |
          for f in public/manifest.webmanifest public/sitemap.xml public/robots.txt public/license.txt; do
            curl --silent --show-error \
              --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
              --ftp-create-dirs \
              -T "$f" \
              "ftp://${{ secrets.FTP_HOST }}/${{ secrets.FTP_TARGET_DIR }}/$(basename $f)"
          done